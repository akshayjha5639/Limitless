services:
  - type: web
    name: limitless-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # means you set it manually in Render dashboard
      - key: APP_ENV
        value: production
